<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSimage 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700&family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        * { -webkit-user-select: none; -webkit-touch-callout: none; }
        
        body { font-family: 'Inter', sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        
        .editor { width: 100%; max-width: 500px; background: #222; padding: 20px; border-radius: 20px; box-sizing: border-box; }
        h2 { font-family: 'Archivo Black', sans-serif; text-align: center; color: #ff4757; font-size: 24px; margin-top: 0; }
        
        textarea { 
            width: 100%; height: 100px; background: #333; border: 1px solid #444; color: #fff; 
            padding: 10px; border-radius: 10px; margin-bottom: 10px; resize: none; outline: none; box-sizing: border-box;
            -webkit-user-select: text; font-size: 16px;
        }
        
        .btn { background: #ff4757; color: white; padding: 18px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; margin-bottom: 10px; -webkit-appearance: none; box-sizing: border-box; }
        .btn-sub { background: #444; font-size: 16px; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-group .btn { flex: 1; font-size: 14px; padding: 12px; margin-bottom: 0; }
        .btn-swim { background: #1e90ff; }
        .btn-run { background: #2ed573; }

        .btn-done { background: #222 !important; color: #666 !important; border: 1px solid #444; opacity: 0.7; pointer-events: none; }
        .btn-data { background: #2f3542; color: #ced4da; margin-top: 5px; display: none; }

        /* --- 타입 선택 UI --- */
        .type-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .type-btn {
            flex: 1;
            padding: 10px 0;
            border-radius: 12px;
            border: 2px solid #444;
            background: #2a2a2a;
            color: #888;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            -webkit-appearance: none;
        }
        .type-btn.active-A { border-color: #ff4757; color: #ff4757; background: rgba(255,71,87,0.12); }
        .type-btn.active-B { border-color: #00d2ff; color: #00d2ff; background: rgba(0,210,255,0.10); }
        .type-btn.active-C { border-color: #f9ca24; color: #f9ca24; background: rgba(249,202,36,0.10); }
        .type-label { font-size: 10px; display: block; margin-top: 2px; opacity: 0.8; }

        #resultContainer { width: 100%; max-width: 500px; display: none; margin-top: 20px; text-align: center; }
        #resultImage { width: 100%; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); -webkit-touch-callout: default !important; pointer-events: auto; }
        canvas { display: none; }
        .guide { color: #888; font-size: 13px; margin-top: 15px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="editor">
    <h2>SSimage 2</h2>
    <textarea id="logInput" placeholder="Strong 로그를 복사해 넣으세요..."></textarea>
    
    <div class="btn-group">
        <button class="btn btn-swim" onclick="recordManual('swim')">🏊‍♂️ 수영 추가</button>
        <button class="btn btn-run" onclick="recordManual('run')">🏃‍♂️ 달리기 추가</button>
    </div>

    <button class="btn btn-sub" onclick="pasteLog()">📋 클립보드 붙여넣기</button>
    <input type="file" id="imageInput" accept="image/*" style="display:none">
    <label for="imageInput" class="btn btn-sub" id="fileLabel" style="display: block; text-align: center;">
        🖼️ 사진 선택하기
    </label>

    <!-- 디자인 타입 선택 -->
    <div class="type-selector">
        <button class="type-btn active-A" id="typeA" onclick="selectType('A')">
            TYPE A
            <span class="type-label">클래식 카드</span>
        </button>
        <button class="type-btn" id="typeB" onclick="selectType('B')">
            TYPE B
            <span class="type-label">터미널</span>
        </button>
        <button class="type-btn" id="typeC" onclick="selectType('C')">
            TYPE C
            <span class="type-label">매거진</span>
        </button>
    </div>

    <button class="btn" onclick="processWorkout()">이미지 생성 (딸깍!)</button>
</div>

<div id="resultContainer">
    <img id="resultImage" alt="Result Workout Image">
    <button id="pushGithubBtn" class="btn btn-data" style="display:block; background: #6c5ce7; color: white;">🚀 깃허브로 데이터 쏘기</button>
    <button id="saveDataBtn" class="btn btn-data" onclick="downloadData()">📊 파일로 저장 (비상용)</button>
    <div class="guide" onclick="resetToken()" style="cursor:pointer">SHARE STRONG IMAGE V2</div>
</div>

<canvas id="canvas"></canvas>

<script>
    let GITHUB_TOKEN = localStorage.getItem('gh_token') || ""; 
    const GITHUB_REPO = "bulcoh/ssimg2"; 
    const GITHUB_FILE_PATH = "data.json";

    let currentMinutes = 0;
    let currentFileDate = "";
    let selectedType = 'A';

    function selectType(type) {
        selectedType = type;
        ['A','B','C'].forEach(t => {
            const btn = document.getElementById('type' + t);
            btn.className = 'type-btn';
            if (t === type) btn.classList.add('active-' + t);
        });
    }

    function checkToken() {
        if (!GITHUB_TOKEN) {
            const input = prompt("🔐 깃허브 토큰이 없습니다.\n처음 한 번만 입력해주세요. (브라우저에 저장됩니다):", "");
            if (input && input.trim().length > 0) {
                GITHUB_TOKEN = input.trim();
                localStorage.setItem('gh_token', GITHUB_TOKEN);
                return true;
            }
            alert("토큰이 없으면 깃허브 전송이 안 돼, 형!");
            return false;
        }
        return true;
    }

    function resetToken() {
        if(confirm("저장된 깃허브 토큰을 지울까?")) {
            localStorage.removeItem('gh_token');
            GITHUB_TOKEN = "";
            alert("삭제 완료! 다음 전송 때 새로 물어볼게.");
        }
    }

    async function pushToGithub(type, mins, dateStr) {
        if (!checkToken()) return;
        const url = `https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}`;
        let sha = "";
        let currentData = {};
        try {
            const res = await fetch(url, { headers: { "Authorization": `Bearer ${GITHUB_TOKEN}` } });
            if (res.ok) {
                const json = await res.json();
                sha = json.sha;
                const content = decodeURIComponent(atob(json.content).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                currentData = JSON.parse(content);
            }
        } catch (e) { console.log("기존 데이터 없음 또는 에러:", e); }
        if (!currentData[dateStr]) currentData[dateStr] = { strong: 0, swim: 0, run: 0 };
        currentData[dateStr][type] = mins;
        const jsonStr = JSON.stringify(currentData, null, 2);
        const encodedContent = btoa(encodeURIComponent(jsonStr).replace(/%([0-9A-F]{2})/g,
            function(match, p1) { return String.fromCharCode('0x' + p1); }));
        const putRes = await fetch(url, {
            method: "PUT",
            headers: { "Authorization": `Bearer ${GITHUB_TOKEN}`, "Content-Type": "application/json" },
            body: JSON.stringify({ message: `Update ${type} at ${dateStr}`, content: encodedContent, sha: sha })
        });
        if (putRes.ok) {
            alert(`✅ ${type} ${mins}분 저장 완료!`);
        } else {
            const errorDetail = await putRes.json();
            if (putRes.status === 401 || putRes.status === 403) {
                alert("❌ 토큰 권한 문제야.");
            } else {
                alert(`❌ 저장 실패: ${errorDetail.message}`);
            }
        }
    }

    async function recordManual(type) {
        const mins = prompt(`${type === 'swim' ? '수영' : '달리기'} 몇 분 했어?`, "0");
        if (mins && !isNaN(mins)) {
            const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
            await pushToGithub(type, parseInt(mins), dateStr);
        }
    }

    document.getElementById('imageInput').onchange = function() {
        const label = document.getElementById('fileLabel');
        label.innerText = "✅ 사진 선택 완료";
        label.classList.add('btn-done');
        if(document.getElementById("logInput").value.trim()){
            setTimeout(processWorkout,300);
        }
    };

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const resultImg = document.getElementById('resultImage');
    const resultContainer = document.getElementById('resultContainer');

    async function pasteLog() {
        try {
            const text = await navigator.clipboard.readText();
            if (text) document.getElementById('logInput').value = text;
        } catch (err) { alert("붙여넣기 권한이 필요합니다."); }
    }
    
    window.addEventListener("load", async () => {
        try {
            const text = await navigator.clipboard.readText();
            if(text){ document.getElementById("logInput").value = text; }
        } catch(e){}
    });
    
    function parseTimeString(timeStr) {
        const parts = timeStr.match(/(오전|오후)\s*(\d+):(\d+)/);
        if (!parts) return null;
        let hours = parseInt(parts[2]);
        const minutes = parseInt(parts[3]);
        if (parts[1] === "오후" && hours < 12) hours += 12;
        else if (parts[1] === "오전" && hours === 12) hours = 0;
        return { hours, minutes };
    }

    function parseWorkout(rawText, photoTime) {
        const paragraphs = rawText.split(/\n\s*\n/).map(p => p.trim()).filter(p => p !== "");
        const headerLines = paragraphs[0].split('\n');
        const workoutTitle = headerLines[0];
        const dateTime = headerLines[1] || "";
        
        const timeMatch = dateTime.match(/(오전|오후)\s*\d+:\d+/);
        const start = timeMatch ? parseTimeString(timeMatch[0]) : {hours:0, minutes:0};
        
        const dateParts = dateTime.match(/(\d+)년\s*(\d+)월\s*(\d+)일/);
        const fileDate = dateParts ? `${dateParts[1]}${dateParts[2].padStart(2, '0')}${dateParts[3].padStart(2, '0')}` : "00000000";

        let endTotal = photoTime.getHours() * 60 + photoTime.getMinutes();
        let startTotal = start.hours * 60 + start.minutes;
        if (endTotal < startTotal) endTotal += 1440;
        const minutes = endTotal - startTotal;

        let totalSets = 0, exerciseList = [];
        paragraphs.slice(1).forEach(para => {
            const lines = para.split('\n').map(l => l.trim());
            let foundName = "", setsInPara = 0, dropSets = 0, warmSets = 0, hasRecord = false, noteText = "";
            lines.forEach(line => {
                const isSet = /^(세트\s*\d+|W\d*|F\d*|D\d*|Set\s*\d+):/i.test(line);
                if (isSet) {
                    hasRecord = true;
                    const upper = line.toUpperCase();
                    const isWarm = /^W\d*:/i.test(line) || line.includes('[워밍업]');
                    const isDrop = line.includes('[드롭세트]') || line.includes('[드롭]') || /^D\d*:/i.test(line);
                    if (isWarm) {
                        warmSets++;  // 총세트 카운트 제외, 표기만
                    } else {
                        totalSets++;
                        if (isDrop) dropSets++;
                        else setsInPara++;
                    }
                } else if (line.startsWith('노트:')) {
                    noteText = line.replace('노트:', '').trim();
                } else if (!foundName && isNaN(line[0]) && !line.includes("kg") && !line.startsWith("http")) {
                    foundName = line;
                }
            });
            if (foundName && hasRecord) exerciseList.push({ name: foundName, sets: setsInPara, drops: dropSets, warms: warmSets, note: noteText });
        });

        return { workoutTitle, dateTime, fileDate, minutes, totalSets, exerciseList };
    }

    function processWorkout() {
        const rawText = document.getElementById('logInput').value;
        const file = document.getElementById('imageInput').files[0];
        if (!rawText || !file) return alert("텍스트와 사진을 모두 넣어주세요!");

        const photoTime = new Date(file.lastModified);
        const parsed = parseWorkout(rawText, photoTime);
        currentMinutes = parsed.minutes;
        currentFileDate = parsed.fileDate;

        const duration = `${Math.floor(currentMinutes/60)}h ${currentMinutes%60}m`;

        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                document.fonts.ready.then(() => {
                    if (selectedType === 'A') {
                        drawTypeA(img, parsed.workoutTitle, parsed.dateTime, duration, parsed.totalSets, parsed.exerciseList);
                    } else if (selectedType === 'B') {
                        drawTypeB(img, parsed.workoutTitle, parsed.dateTime, duration, parsed.totalSets, parsed.exerciseList);
                    } else {
                        drawTypeC(img, parsed.workoutTitle, parsed.dateTime, duration, parsed.totalSets, parsed.exerciseList);
                    }
                    resultImg.src = canvas.toDataURL('image/png');
                    resultContainer.style.display = 'block';
                    
                    const pushBtn = document.getElementById('pushGithubBtn');
                    pushBtn.onclick = () => pushToGithub('strong', currentMinutes, currentFileDate);
                    pushBtn.innerText = "🚀 깃허브로 데이터 쏘기";
                    pushBtn.classList.remove('btn-done');
                });
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function downloadData() {
        const fileName = `ssimg_${currentFileDate}_${currentMinutes}.txt`;
        const blob = new Blob(["workout"], { type: "text/plain" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
    }

    // ─── TYPE A (기존 오리지널) ───────────────────────────────────────────────
    function drawTypeA(img, workoutTitle, dateTime, duration, totalSets, exerciseList) {
        canvas.width = 1080; canvas.height = 1350; 
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const cardH = canvas.height * 0.55;
        const grad = ctx.createLinearGradient(0, canvas.height - cardH, 0, canvas.height);
        grad.addColorStop(0, "rgba(0,0,0,0)");
        grad.addColorStop(0.3, "rgba(0,0,0,0.5)");
        grad.addColorStop(1, "rgba(0,0,0,0.8)"); 
        ctx.fillStyle = grad;
        ctx.fillRect(0, canvas.height - cardH, canvas.width, cardH);

        const margin = 70;
        const colW = (canvas.width - margin * 2) / 2 - 30;
        const rowHeight = 70;
        const bottomY = canvas.height - 180; 
        const half = Math.ceil(exerciseList.length / 2);

        exerciseList.forEach((ex, i) => {
            let isRightCol = i >= half;
            let rowIdx = isRightCol ? i - half : i;
            const totalRowsInCol = isRightCol ? (exerciseList.length - half) : half;
            let x = margin + (isRightCol ? colW + 60 : 0);
            let y = bottomY - (totalRowsInCol - 1 - rowIdx) * rowHeight;
            ctx.textAlign = "left"; ctx.fillStyle = "white"; ctx.font = "700 36px 'Inter'";
            let name = ex.name;
            if (ctx.measureText(name).width > colW - 150) {
                while (ctx.measureText(name + "..").width > colW - 150) { name = name.slice(0, -1); }
                name += "..";
            }
            ctx.fillText(name, x, y);
            ctx.textAlign = "right";
            ctx.font = "700 " + (ex.sets > 5 ? 26 : 36) + "px 'Inter'";
            // 워밍업(노란) + 일반(레드) + 드롭(파란) — 오른쪽부터 드롭,일반,워밍업 순
            const aWarms = ex.warms || 0;
            const aDrops = ex.drops || 0;
            const aWarm = "ㅇ".repeat(aWarms);
            const aNorm = "ㅇ".repeat(ex.sets);
            const aDrop = "ㅇ".repeat(aDrops);
            const aDropW = ctx.measureText(aDrop).width;
            const aNormW = ctx.measureText(aNorm).width;
            ctx.fillStyle = "#4a9eff";
            ctx.fillText(aDrop, x + colW, y);
            ctx.fillStyle = "#ff4757";
            ctx.fillText(aNorm, x + colW - aDropW, y);
            ctx.fillStyle = "#ffd700";
            ctx.fillText(aWarm, x + colW - aDropW - aNormW, y);
        });

        const summaryY = canvas.height - 180 - (Math.max(half, exerciseList.length - half) - 1) * rowHeight - 110; 
        ctx.textAlign = "center"; ctx.fillStyle = "#ccc"; ctx.font = "400 32px 'Inter'";
        ctx.fillText(dateTime + "  |  " + duration + "  |  TOTAL " + totalSets + " SETS", canvas.width / 2, summaryY);
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(margin, summaryY + 45); ctx.lineTo(canvas.width - margin, summaryY + 45); ctx.stroke();
        ctx.textAlign = "center"; ctx.fillStyle = "#ff4757"; ctx.font = "700 85px 'Archivo Black'";
        ctx.fillText(workoutTitle.toUpperCase(), canvas.width / 2, canvas.height - 45);
    }

    // ─── TYPE B ─────────────────────────────────────────────────────────────
    function drawTypeB(img, workoutTitle, dateTime, duration, totalSets, exerciseList) {
        canvas.width = 1080; canvas.height = 1350;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const iX = 70;
        const rX = canvas.width - 70;

        // 상단 그라디언트: 더 진하게 — 위 검정75% → 투명
        const topGrad = ctx.createLinearGradient(0, 0, 0, 420);
        topGrad.addColorStop(0,   "rgba(0,0,0,0.82)");
        topGrad.addColorStop(0.6, "rgba(0,0,0,0.4)");
        topGrad.addColorStop(1,   "rgba(0,0,0,0)");
        ctx.fillStyle = topGrad;
        ctx.fillRect(0, 0, canvas.width, 420);

        // 하단 그라디언트: 목록 높이에 맞게
        const half = Math.ceil(exerciseList.length / 2);
        const hasNote = exerciseList.some(function(e){ return e.note; });
        const rowH = hasNote ? 62 : 52;  // 여백 타이트하게
        const listAreaH = half * rowH + 70;
        const botGradTop = canvas.height - listAreaH - 60;

        const botGrad = ctx.createLinearGradient(0, botGradTop, 0, canvas.height);
        botGrad.addColorStop(0, "rgba(0,0,0,0)");
        botGrad.addColorStop(1, "rgba(0,0,0,0.65)");
        ctx.fillStyle = botGrad;
        ctx.fillRect(0, botGradTop, canvas.width, canvas.height - botGradTop);

        // ── 상단: 제목 (빨간색, 중앙정렬, 더 크게) ──
        ctx.fillStyle = "#ff4757";
        ctx.font = "700 140px 'Archivo Black'";
        ctx.textAlign = "center";
        ctx.fillText(workoutTitle.toUpperCase(), canvas.width / 2, 158);

        // 메타 (중앙정렬)
        ctx.fillStyle = "rgba(255,255,255,0.55)";
        ctx.font = "400 30px 'Inter'";
        ctx.textAlign = "center";
        ctx.fillText(dateTime + "  |  " + duration + "  |  TOTAL " + totalSets + " SETS", canvas.width / 2, 205);

        // 상단 구분선
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(iX, 226);
        ctx.lineTo(rX, 226);
        ctx.stroke();

        // ── 하단: 2단 운동 목록 — 하단에서 위로 쌓음 ──
        const colW = (canvas.width - iX * 2 - 40) / 2;
        const col2X = iX + colW + 40;

        // 목록 맨 아래 기준점: 서명 위 10px
        const signY = canvas.height - 18;
        const listBot = signY - 60;  // 서명과 목록 사이 한 칸

        exerciseList.forEach(function(ex, i) {
            const col = i >= half ? 1 : 0;
            const row = col === 0 ? i : i - half;
            const colRows = col === 0 ? half : exerciseList.length - half;
            const x  = col === 0 ? iX : col2X;
            const xR = col === 0 ? iX + colW : col2X + colW;

            // 아래에서 위로 배치
            const y = listBot - (colRows - 1 - row) * rowH;

            // 이름
            ctx.fillStyle = "rgba(255,255,255,0.92)";
            ctx.font = "700 34px 'Inter'";
            ctx.textAlign = "left";
            let name = ex.name;
            const maxW = colW - 155;
            if (ctx.measureText(name).width > maxW) {
                while (ctx.measureText(name + "..").width > maxW) name = name.slice(0, -1);
                name += "..";
            }
            ctx.fillText(name, x, y);

            // 노트
            if (ex.note) {
                ctx.fillStyle = "rgba(255,210,75,0.78)";
                ctx.font = "400 20px 'Inter'";
                ctx.fillText(ex.note, x, y + 22);
            }

            // ㅇ 세트 — 워밍업:노란, 일반:레드, 드롭:파란
            ctx.font = "700 " + (ex.sets > 5 ? 26 : 32) + "px 'Inter'";
            ctx.textAlign = "right";
            const bWarms = ex.warms || 0;
            const bDrops = ex.drops || 0;
            const bWarm = "ㅇ".repeat(bWarms);
            const bDrop = "ㅇ".repeat(bDrops);
            const bNorm = "ㅇ".repeat(ex.sets);
            const bDropW = ctx.measureText(bDrop).width;
            const bNormW = ctx.measureText(bNorm).width;
            ctx.fillStyle = "#4a9eff";
            ctx.fillText(bDrop, xR, y);
            ctx.fillStyle = "#ff4757";
            ctx.fillText(bNorm, xR - bDropW, y);
            ctx.fillStyle = "#ffd700";
            ctx.fillText(bWarm, xR - bDropW - bNormW, y);
        });

        // 하단 서명
        ctx.fillStyle = "rgba(255,255,255,0.22)";
        ctx.font = "400 22px 'Inter'";
        ctx.textAlign = "center";
        ctx.fillText("SHARE STRONG IMAGE V2", canvas.width / 2, signY);
    }

    // ─── TYPE C : 좌하단 카드 ──────────────────────────────────────────────
    function drawTypeC(img, workoutTitle, dateTime, duration, totalSets, exerciseList) {
        canvas.width = 1080; canvas.height = 1350;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const ACCENT = "#ff4757";
        const pad = 36;        // 카드 내부 패딩
        const cardW = 460;     // 카드 너비
        const cardX = 40;      // 좌측 여백
        const cardBot = canvas.height - 40; // 하단 여백

        // 카드 높이 계산 (운동 목록 수에 따라)
        const hasNote = exerciseList.some(function(e){ return e.note; });
        const rowH = hasNote ? 80 : 68;
        const listH = exerciseList.length * rowH;
        const headerH = 260; // 타이틀+메타 영역
        const footerH = 40;
        const cardH = headerH + listH + footerH;
        const cardY = cardBot - cardH;

        // 카드 배경 (반투명 검정)
        ctx.fillStyle = "rgba(0,0,0,0.50)";
        roundRect(ctx, cardX, cardY, cardW, cardH, 16);
        ctx.fill();

        const iX = cardX + pad;
        const rX = cardX + cardW - pad;

        // ── 타이틀 ──
        ctx.fillStyle = ACCENT;
        ctx.textAlign = "left";
        let fs = 88;
        ctx.font = "700 " + fs + "px 'Archivo Black'";
        while (ctx.measureText(workoutTitle.toUpperCase()).width > rX - iX && fs > 44) {
            fs -= 4;
            ctx.font = "700 " + fs + "px 'Archivo Black'";
        }
        ctx.fillText(workoutTitle.toUpperCase(), iX, cardY + fs + 20);

        // ── 메타 ──
        const metaY = cardY + fs + 24;
        ctx.fillStyle = "rgba(255,255,255,0.45)";
        ctx.font = "400 24px 'Inter'";
        ctx.fillText(dateTime, iX, metaY + 32);
        ctx.fillText("TOTAL " + totalSets + " SETS", iX, metaY + 62);
        ctx.fillText(duration, iX, metaY + 92);

        // 구분선
        const divY = metaY + 110;
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(iX, divY);
        ctx.lineTo(rX, divY);
        ctx.stroke();

        // ── 운동 목록 ──
        const listStartY = divY + 30;

        exerciseList.forEach(function(ex, i) {
            const y = listStartY + i * rowH;

            // 이름 — 밝은 회색
            ctx.fillStyle = "rgba(220,220,220,0.92)";
            ctx.font = "700 26px 'Inter'";
            ctx.textAlign = "left";
            let name = ex.name;
            const maxW = rX - iX;
            if (ctx.measureText(name).width > maxW) {
                while (ctx.measureText(name + "..").width > maxW) name = name.slice(0, -1);
                name += "..";
            }
            ctx.fillText(name, iX, y);

            // 노트
            let blockY = y + 28;
            if (ex.note) {
                ctx.fillStyle = "rgba(255,210,75,0.78)";
                ctx.font = "400 18px 'Inter'";
                ctx.fillText(ex.note, iX, y + 24);
                blockY = y + 46;
            }

            // 세트 블록 — 워밍업:노란, 일반:레드, 드롭:파란
            const bW = 26, bH = 20, bGap = 6;
            const cWarms = ex.warms || 0;
            const cDrops = ex.drops || 0;
            const warmCount = Math.min(cWarms, 12);
            const normalCount = Math.min(ex.sets, 12 - warmCount);
            const dropCount = Math.min(cDrops, 12 - warmCount - normalCount);
            let bx = iX;
            // 워밍업 (노란색)
            ctx.fillStyle = "#ffd700";
            for (let s = 0; s < warmCount; s++) {
                ctx.fillRect(bx + s * (bW + bGap), blockY - bH, bW, bH);
            }
            bx += warmCount * (bW + bGap);
            // 일반 세트 (레드)
            ctx.fillStyle = ACCENT;
            for (let s = 0; s < normalCount; s++) {
                ctx.fillRect(bx + s * (bW + bGap), blockY - bH, bW, bH);
            }
            bx += normalCount * (bW + bGap);
            // 드롭 세트 (파란색)
            ctx.fillStyle = "#4a9eff";
            for (let s = 0; s < dropCount; s++) {
                ctx.fillRect(bx + s * (bW + bGap), blockY - bH, bW, bH);
            }
            if ((cWarms + ex.sets + cDrops) > 12) {
                ctx.fillStyle = "rgba(255,255,255,0.5)";
                ctx.font = "400 17px 'Inter'";
                ctx.fillText("+" + (cWarms + ex.sets + cDrops - 12), bx + dropCount * (bW + bGap) + 4, blockY - 2);
            }
        });

        // 하단 서명
        ctx.fillStyle = "rgba(255,255,255,0.18)";
        ctx.font = "400 20px 'Inter'";
        ctx.textAlign = "center";
        ctx.fillText("SHARE STRONG IMAGE V2", cardX + cardW / 2, cardBot - 12);
    }

    // ─── 유틸: 둥근 사각형 ───────────────────────────────────────────────────
    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }

    (function(){
        const params = new URLSearchParams(location.search);
        const data = params.get("log");
        if(data){
            document.getElementById("logInput").value = decodeURIComponent(data);
            setTimeout(()=>{ document.getElementById("imageInput").click(); }, 500);
        }
    })();
</script>
