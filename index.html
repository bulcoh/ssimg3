<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Workout Card</title>

<style>
body{
background:#111;
color:white;
font-family:-apple-system;
text-align:center;
margin:30px;
}

textarea{
width:90%;
max-width:600px;
height:150px;
}

canvas{
margin-top:20px;
border-radius:20px;
}

button{
margin-top:10px;
padding:10px 20px;
font-size:16px;
}
</style>
</head>

<body>

<input type="file" id="photo"><br>
<textarea id="log" placeholder="Strong 로그"></textarea><br>
<button onclick="generate()">Generate</button>

<br>

<canvas id="canvas" width="1080" height="1080"></canvas>

<script>

function parseStrong(text){

const lines = text.split("\n").map(v=>v.trim()).filter(v=>v)

let title = lines[0] || "Workout"
let exercises = {}
let current=null

for(let l of lines){

if(/kg|lb/.test(l)){
if(current) exercises[current]++
}else{

if(!exercises[l]){
exercises[l]=0
current=l
}

}

}

let list=[]

for(let k in exercises){
if(exercises[k]>0){
list.push({name:k,sets:exercises[k]})
}
}

return {title,list}

}

function drawContain(ctx,img,w,h){

const ir=img.width/img.height
const cr=w/h

let dw,dh,x,y

if(ir>cr){
dw=w
dh=w/ir
x=0
y=(h-dh)/2
}else{
dh=h
dw=h*ir
x=(w-dw)/2
y=0
}

ctx.drawImage(img,x,y,dw,dh)

}

function generate(){

const log=document.getElementById("log").value
const file=document.getElementById("photo").files[0]

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

const data=parseStrong(log)

ctx.fillStyle="#000"
ctx.fillRect(0,0,1080,1080)

const photoHeight=720
const cardHeight=360

function drawCard(){

ctx.fillStyle="#0f0f0f"
ctx.fillRect(0,photoHeight,1080,cardHeight)

ctx.fillStyle="white"

ctx.font="bold 48px sans-serif"
ctx.fillText(data.title,60,photoHeight+70)

ctx.font="36px sans-serif"

let y=photoHeight+140

for(let ex of data.list){

ctx.fillText(
ex.name+"  ·  "+ex.sets+" sets",
60,
y
)

y+=55

}

}

if(file){

const img=new Image()

img.onload=function(){

drawContain(ctx,img,1080,photoHeight)

drawCard()

}

img.src=URL.createObjectURL(file)

}else{

drawCard()

}

}

</script>

</body>
</html>
