<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Workout Card</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #111;
      color: #fff;
    }
    .card {
      width: 1080px;
      height: 1350px;
      margin: 0 auto;
      padding: 40px;
      box-sizing: border-box;
      background: #181818;
      display: flex;
      flex-direction: column;
      border-radius: 40px;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 24px;
    }
    .avatar-wrapper {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #ff7a3c;
      flex-shrink: 0;
    }
    .avatar-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .title-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .title {
      font-size: 36px;
      font-weight: 700;
    }
    .subtitle {
      font-size: 20px;
      color: #aaa;
    }
    .content {
      flex: 1;
      margin-top: 16px;
      padding: 24px;
      background: #101010;
      border-radius: 24px;
      overflow: hidden auto;
      white-space: pre-line;
      font-size: 20px;
      line-height: 1.5;
    }
    .footer {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #777;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="top">
      <div class="avatar-wrapper">
        <!-- 여기에 사용자가 업로드한 이미지 -->
        <img id="avatar" src="" alt="avatar">
      </div>
      <div class="title-block">
        <div class="title" id="workout-title">PUSH #1</div>
        <div class="subtitle" id="workout-date">2026년 3월 2일 월요일</div>
      </div>
    </div>
    <div class="content" id="workout-text">
      로딩 중...
    </div>
    <div class="footer">
      <span>@your_id</span>
      <span>Made with Strong</span>
    </div>
  </div>

  <!-- 이미지 업로드 + 캡처 버튼 -->
  <input type="file" id="fileInput" accept="image/*" />
  <button id="downloadBtn">이미지 저장</button>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    // 1) URL에서 text 파라미터 읽기 (단축어에서 보낸 Strong 텍스트)
    const params = new URLSearchParams(location.search);
    const raw = params.get('text') || '';
    const decoded = decodeURIComponent(raw);

    // 2) 첫 줄/둘째 줄 정도를 제목/날짜로 쓰고, 나머지는 본문에
    const lines = decoded.split('\
').filter(l => l.trim() !== '');
    const titleEl = document.getElementById('workout-title');
    const dateEl  = document.getElementById('workout-date');
    const textEl  = document.getElementById('workout-text');

    if (lines.length > 0) titleEl.textContent = lines[0];
    if (lines.length > 1) dateEl.textContent  = lines[1];
    textEl.textContent = lines.slice(2).join('\
');

    // 3) 아바타(프로필/운동사진) 업로드
    const fileInput = document.getElementById('fileInput');
    const avatarImg = document.getElementById('avatar');
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        avatarImg.src = reader.result;
      };
      reader.readAsDataURL(file);
    });

    // 4) html2canvas로 카드 영역만 캡처해서 이미지 다운로드
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const card = document.getElementById('card');
      html2canvas(card, {
        useCORS: true,
        scale: 2,
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'workout-card.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    });
  </script>
</body>
</html>
