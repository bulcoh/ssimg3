<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Workout Card</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+KR:wght@300;400;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --ink: #0d0d0d;
  --paper: #f0ece3;
  --ruled: #ddd8ce;
  --red: #e63322;
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  padding: 24px 16px 80px;
}

.app-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 28px;
  border-bottom: 3px solid var(--ink);
  padding-bottom: 12px;
}
.app-title { font-family: 'Anton', sans-serif; font-size: 2.4rem; letter-spacing: 1px; line-height: 1; }
.app-title span { color: var(--red); }
.app-ver { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #999; padding-bottom: 4px; }

.block {
  background: white;
  border: 2px solid var(--ink);
  margin-bottom: 10px;
  box-shadow: 4px 4px 0 var(--ink);
}
.block-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  border-bottom: 2px solid var(--ink);
  background: var(--ink);
}
.block-num { font-family: 'Anton', sans-serif; font-size: 1.1rem; color: var(--red); }
.block-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--paper); }
.block-body { padding: 14px; }

textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1.5px solid var(--ruled);
  color: var(--ink);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  line-height: 2;
  padding: 4px 0;
  resize: none;
  outline: none;
  min-height: 160px;
}
textarea::placeholder { color: #bbb; }

.chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; min-height: 24px; }
.chip { font-family: 'IBM Plex Mono', monospace; font-size: 9px; padding: 3px 8px; border: 1px solid var(--ink); background: white; letter-spacing: 0.5px; }
.chip.is-note { background: rgba(230,51,34,0.1); border-color: var(--red); color: var(--red); }

.photo-drop {
  width: 100%; height: 140px;
  border: 2px dashed #bbb;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative; overflow: hidden;
  background: #fafafa;
}
.photo-drop:active { border-color: var(--red); }
.photo-drop img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.drop-hint { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #bbb; display: flex; flex-direction: column; align-items: center; gap: 6px; }
#photoInput { display: none; }

.style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sty {
  border: 2px solid var(--ink); padding: 12px 8px; text-align: center;
  cursor: pointer; font-family: 'Anton', sans-serif; font-size: 1rem;
  letter-spacing: 1.5px; background: white;
  box-shadow: 3px 3px 0 var(--ink); transition: all 0.1s;
}
.sty:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
.sty.on { background: var(--ink); color: var(--paper); }
.sty-sub { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0; display: block; margin-top: 2px; opacity: 0.6; font-weight: normal; }

#genBtn {
  width: 100%; padding: 20px;
  background: var(--red); color: white;
  border: 2px solid var(--ink);
  font-family: 'Anton', sans-serif; font-size: 1.5rem; letter-spacing: 3px;
  cursor: pointer; box-shadow: 5px 5px 0 var(--ink); transition: all 0.1s; margin-top: 4px;
}
#genBtn:active { transform: translate(3px,3px); box-shadow: 2px 2px 0 var(--ink); }
#genBtn:disabled { opacity: 0.4; pointer-events: none; }

#outSection { display: none; margin-top: 16px; }
#cardCanvas { width: 100%; display: block; border: 2px solid var(--ink); box-shadow: 6px 6px 0 var(--ink); }
#saveBtn {
  width: 100%; margin-top: 10px; padding: 16px;
  background: white; color: var(--ink);
  border: 2px solid var(--ink); font-family: 'Anton', sans-serif;
  font-size: 1.1rem; letter-spacing: 2px;
  cursor: pointer; box-shadow: 4px 4px 0 var(--ink); transition: all 0.1s;
}
#saveBtn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--ink); }

.loader { display: none; text-align: center; padding: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #999; }
.loader.on { display: block; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">LIFT<span>.</span>CARD</div>
  <div class="app-ver">v2.0 · STRONG→IG</div>
</div>

<div class="block">
  <div class="block-head"><span class="block-num">01</span><span class="block-title">운동 로그 붙여넣기</span></div>
  <div class="block-body">
    <textarea id="logInput" placeholder="Strong 앱 결과화면 텍스트 전체를 붙여넣으세요."></textarea>
    <div class="chips" id="parsedChips"></div>
  </div>
</div>

<div class="block">
  <div class="block-head"><span class="block-num">02</span><span class="block-title">사진 선택</span></div>
  <div class="block-body">
    <div class="photo-drop" id="photoArea" onclick="document.getElementById('photoInput').click()">
      <div class="drop-hint">
        <svg width="28" height="28" fill="none" stroke="#bbb" stroke-width="1.5" viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>탭하여 사진 선택</span>
      </div>
    </div>
    <input type="file" id="photoInput" accept="image/*">
  </div>
</div>

<div class="block">
  <div class="block-head"><span class="block-num">03</span><span class="block-title">카드 스타일</span></div>
  <div class="block-body">
    <div class="style-grid">
      <div class="sty on" data-s="brutal">BRUTAL<span class="sty-sub">흑백 + 레드</span></div>
      <div class="sty" data-s="night">NIGHT<span class="sty-sub">딥블루 + 네온</span></div>
      <div class="sty" data-s="print">PRINT<span class="sty-sub">신문 + 잉크</span></div>
      <div class="sty" data-s="tape">TAPE<span class="sty-sub">크래프트 + 금</span></div>
    </div>
  </div>
</div>

<button id="genBtn">GENERATE CARD →</button>
<div class="loader" id="loader">렌더링 중 ···</div>

<div id="outSection">
  <canvas id="cardCanvas"></canvas>
  <button id="saveBtn">↓ 이미지 저장</button>
</div>

<script>
// ═══════════════════════════
//  PARSER
// ═══════════════════════════
function parseLog(raw) {
  const lines = raw.trim().split('\n').map(l => l.trim()).filter(Boolean);
  let title = '', dateStr = '', exercises = [];
  let i = 0;

  // 제목
  if (lines[i] && /^[A-Z가-힣#\s\d\(\)]+$/.test(lines[i]) && !/년|월|일/.test(lines[i])) {
    title = lines[i++];
  }
  // 날짜
  if (lines[i] && /년|월|일/.test(lines[i])) { dateStr = lines[i++]; }

  const isSetLine  = l => /^세트\s*\d+\s*:/.test(l);
  const isWarmup   = l => /^W\s*:/.test(l);
  const isDrop     = l => /^D\s*:/.test(l);
  const isDataLine = l => isSetLine(l) || isWarmup(l) || isDrop(l);
  const isUrl      = l => /^https?:\/\//.test(l);
  const isEndTag   = l => /^로그끝/.test(l);

  let cur = null;

  while (i < lines.length) {
    const l = lines[i];

    if (isUrl(l) || isEndTag(l)) { i++; continue; }

    if (isDataLine(l)) {
      if (cur && isSetLine(l)) cur.setCount++;
      i++; continue;
    }

    // 데이터가 아닌 줄 = 운동명 or 메모
    if (!cur) {
      cur = { name: l, note: null, setCount: 0 };
    } else if (cur.setCount === 0 && cur.note === null) {
      // 아직 세트 없고 메모 없음 → 메모로 처리
      cur.note = l;
    } else {
      // 새 종목
      if (cur.setCount > 0) exercises.push(cur);
      cur = { name: l, note: null, setCount: 0 };
    }
    i++;
  }
  if (cur && cur.setCount > 0) exercises.push(cur);

  return { title, dateStr, exercises };
}

// ═══════════════════════════
//  UI
// ═══════════════════════════
let userPhoto = null, selStyle = 'brutal';

document.getElementById('logInput').addEventListener('input', function() {
  const d = parseLog(this.value);
  const c = document.getElementById('parsedChips');
  c.innerHTML = '';
  if (d.title) c.innerHTML += `<span class="chip">${d.title}</span>`;
  if (d.dateStr) c.innerHTML += `<span class="chip">${d.dateStr}</span>`;
  d.exercises.forEach(e => {
    c.innerHTML += `<span class="chip">${e.name} ×${e.setCount}</span>`;
    if (e.note) c.innerHTML += `<span class="chip is-note">📝 ${e.note}</span>`;
  });
});

document.getElementById('photoInput').addEventListener('change', function(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    userPhoto = ev.target.result;
    document.getElementById('photoArea').innerHTML = `<img src="${userPhoto}">`;
  };
  r.readAsDataURL(f);
});

document.querySelectorAll('.sty').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.sty').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    selStyle = b.dataset.s;
  });
});

document.getElementById('genBtn').addEventListener('click', () => {
  const raw = document.getElementById('logInput').value;
  if (!raw.trim()) { alert('로그를 붙여넣어주세요.'); return; }
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  document.getElementById('loader').classList.add('on');
  setTimeout(() => {
    drawCard(parseLog(raw), userPhoto, selStyle);
    document.getElementById('loader').classList.remove('on');
    document.getElementById('outSection').style.display = 'block';
    document.getElementById('outSection').scrollIntoView({ behavior: 'smooth' });
    btn.disabled = false;
  }, 80);
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = `liftcard_${Date.now()}.png`;
  a.href = document.getElementById('cardCanvas').toDataURL('image/png');
  a.click();
});

// ═══════════════════════════
//  CANVAS DRAW
// ═══════════════════════════
const THEMES = {
  brutal: {
    bg: '#f0ece3', photoOverlay: 'rgba(0,0,0,0.45)',
    headerBg: '#0d0d0d', headerText: '#f0ece3', accent: '#e63322',
    cardBg: '#ffffff', cardBorder: '#0d0d0d',
    exName: '#0d0d0d', setDot: '#e63322', noteTxt: '#e63322',
    footerText: '#aaa', shadow: '#0d0d0d', ruled: true
  },
  night: {
    bg: '#070b1a', photoOverlay: 'rgba(7,11,26,0.55)',
    headerBg: '#0f153a', headerText: '#e8f0ff', accent: '#00f5c4',
    cardBg: '#0f153a', cardBorder: '#1d2760',
    exName: '#e8f0ff', setDot: '#00f5c4', noteTxt: '#7b9aff',
    footerText: '#2a3568', shadow: null, ruled: false
  },
  print: {
    bg: '#fffff0', photoOverlay: 'rgba(0,0,0,0.55)',
    headerBg: '#fffff0', headerText: '#111', accent: '#111',
    cardBg: '#fffff0', cardBorder: '#111',
    exName: '#111', setDot: '#111', noteTxt: '#555',
    footerText: '#aaa', shadow: '#bbb', ruled: true
  },
  tape: {
    bg: '#2b1f0e', photoOverlay: 'rgba(20,12,0,0.5)',
    headerBg: '#3d2b12', headerText: '#f5dfa0', accent: '#d4af37',
    cardBg: '#3d2b12', cardBorder: '#5a3e18',
    exName: '#f5dfa0', setDot: '#d4af37', noteTxt: '#d4af37',
    footerText: '#6b4d22', shadow: '#d4af37', ruled: false
  }
};

function drawCard(data, photo, style) {
  const W = 1080, H = 1350;
  const cv = document.getElementById('cardCanvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  const t = THEMES[style];

  // bg
  ctx.fillStyle = t.bg;
  ctx.fillRect(0, 0, W, H);

  // ruled lines
  if (t.ruled) {
    ctx.strokeStyle = 'rgba(0,0,0,0.04)';
    ctx.lineWidth = 1;
    for (let y = 60; y < H; y += 48) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  }

  // PHOTO
  let photoBottom = 0;
  if (photo) {
    const img = new Image(); img.src = photo;
    const pH = 560;
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, W, pH); ctx.clip();
    const ir = img.naturalWidth / img.naturalHeight, cr = W / pH;
    let sw = img.naturalWidth, sh = img.naturalHeight, sx = 0, sy = 0;
    if (ir > cr) { sw = sh * cr; sx = (img.naturalWidth - sw) / 2; }
    else { sh = sw / cr; sy = (img.naturalHeight - sh) / 2; }
    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, W, pH);
    const g = ctx.createLinearGradient(0, pH * 0.25, 0, pH);
    g.addColorStop(0, 'rgba(0,0,0,0)');
    g.addColorStop(1, t.photoOverlay);
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, pH);
    ctx.restore();
    photoBottom = pH;
  }

  // HEADER
  const hY = photo ? photoBottom - 160 : 30;
  if (!photo && style !== 'print') {
    ctx.fillStyle = t.headerBg;
    ctx.fillRect(0, 0, W, 195);
  }

  ctx.font = `normal 104px 'Anton', sans-serif`;
  ctx.fillStyle = photo ? '#ffffff' : t.headerText;
  ctx.fillText(data.title || 'WORKOUT', 52, hY + 100);

  ctx.fillStyle = t.accent;
  ctx.fillRect(52, hY + 116, 200, 7);

  ctx.font = `400 28px 'IBM Plex Mono', monospace`;
  ctx.fillStyle = photo ? 'rgba(255,255,255,0.8)' : (style === 'print' ? '#777' : t.accent);
  ctx.fillText(data.dateStr || '', 52, hY + 158);

  // EXERCISE GRID
  const listTop = photo ? photoBottom + 36 : 218;
  const PAD = 52, GAP = 16;
  const colW = (W - PAD * 2 - GAP) / 2;
  const ROW_H = 92;
  const maxEx = Math.min(data.exercises.length, 10);

  for (let i = 0; i < maxEx; i++) {
    const ex = data.exercises[i];
    const col = i % 2;
    const row = Math.floor(i / 2);
    const cx = PAD + col * (colW + GAP);
    const cy = listTop + row * ROW_H;
    const ch = ROW_H - 10;

    // shadow
    if (t.shadow) {
      ctx.fillStyle = t.shadow;
      ctx.fillRect(cx + 5, cy + 5, colW, ch);
    }
    // card
    ctx.fillStyle = t.cardBg;
    ctx.fillRect(cx, cy, colW, ch);
    ctx.strokeStyle = t.cardBorder;
    ctx.lineWidth = style === 'night' ? 1 : 2;
    ctx.strokeRect(cx, cy, colW, ch);

    // left stripe
    ctx.fillStyle = t.accent;
    ctx.fillRect(cx, cy, 6, ch);

    // name
    const name = ex.name.length > 19 ? ex.name.slice(0,17) + '…' : ex.name;
    ctx.font = `700 21px 'Noto Sans KR', sans-serif`;
    ctx.fillStyle = t.exName;
    ctx.fillText(name, cx + 18, cy + 28);

    // note
    if (ex.note) {
      const noteShort = ex.note.length > 20 ? ex.note.slice(0,18) + '…' : ex.note;
      ctx.font = `400 15px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = t.noteTxt;
      ctx.fillText(`"${noteShort}"`, cx + 18, cy + 48);
    }

    // dots + count
    const dotY = cy + ch - 16;
    const maxDots = Math.min(ex.setCount, 12);
    for (let s = 0; s < maxDots; s++) {
      ctx.beginPath();
      ctx.arc(cx + 18 + s * 16, dotY, 6, 0, Math.PI * 2);
      ctx.fillStyle = t.setDot;
      ctx.fill();
    }
    ctx.font = `600 15px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = t.setDot;
    ctx.fillText(`×${ex.setCount}`, cx + colW - 44, dotY + 5);
  }

  // overflow
  if (data.exercises.length > maxEx) {
    const rows = Math.ceil(maxEx / 2);
    const ty = listTop + rows * ROW_H + 10;
    ctx.font = `600 22px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = t.accent;
    ctx.fillText(`+ ${data.exercises.length - maxEx} more`, PAD, ty);
  }

  // FOOTER
  ctx.fillStyle = t.accent;
  ctx.fillRect(PAD, H - 82, W - PAD * 2, 2);

  ctx.font = `400 22px 'IBM Plex Mono', monospace`;
  ctx.fillStyle = t.footerText;
  ctx.fillText('STRONG APP', PAD, H - 44);

  const totalSets = data.exercises.reduce((a, e) => a + e.setCount, 0);
  const badge = `TOTAL ${totalSets} SETS`;
  ctx.font = `600 22px 'IBM Plex Mono', monospace`;
  ctx.fillStyle = t.accent;
  const bw = ctx.measureText(badge).width;
  ctx.fillText(badge, W - PAD - bw, H - 44);
}
</script>
</body>
</html>
